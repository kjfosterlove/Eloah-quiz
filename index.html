<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Find Your Tallow</title>
  <style>
    :root{
      --bg:#f8f5f0;
      --card:#ffffff;
      --text:#2d2a26;
      --muted:#6f675f;
      --line:#ddd3c8;
      --accent:#2d2a26;
      --soft:#ece4db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
      line-height: 1.45;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h1, h2, h3 {
      margin: 0 0 8px 0;
    }

    p {
      margin: 0 0 12px 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }

    .hidden {
      display: none;
    }

    .small {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .season-note {
      margin-bottom: 14px;
      color: var(--muted);
    }

    .choice-grid,
    .check-grid {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .choice-btn,
    .check-item,
    .action-btn,
    .link-btn {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 14px 16px;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn.selected,
    .check-item.selected {
      background: var(--soft);
      border-color: var(--text);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .action-btn {
      width: auto;
      min-width: 120px;
      text-align: center;
      background: var(--accent);
      color: #fff;
      border: none;
    }

    .action-btn.secondary {
      background: #e9e2d9;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .tag {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f2eee8;
      margin: 6px 6px 0 0;
      font-size: 13px;
    }

    .result {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .link-btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      margin-top: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
    }

    .section-label {
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }

    .bundle-box {
      background: #fbf8f4;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Find your perfect tallow</h1>
      <p class="small">Choose what your skin needs, and I’ll recommend the best fit for this season.</p>
      <p id="season-note" class="season-note"></p>
    </div>

    <div id="step1" class="card">
      <div class="section-label">Step 1</div>
      <h2>Who are you shopping for?</h2>
      <div class="choice-grid">
        <button class="choice-btn" data-value="me" onclick="selectShopFor('me', this)">Just me</button>
        <button class="choice-btn" data-value="other" onclick="selectShopFor('other', this)">Someone else</button>
        <button class="choice-btn" data-value="both" onclick="selectShopFor('both', this)">Both</button>
      </div>
      <div class="btn-row">
        <button class="action-btn" onclick="goToNeeds()">Next</button>
      </div>
    </div>

    <div id="step2a" class="card hidden">
      <div class="section-label">Step 2</div>
      <h2>What does your skin need most right now?</h2>
      <div id="needs-me" class="check-grid"></div>
      <div class="btn-row">
        <button class="action-btn secondary" onclick="showStep('step1')">Back</button>
        <button class="action-btn" onclick="goFromNeedsMe()">Next</button>
      </div>
    </div>

    <div id="step2b" class="card hidden">
      <div class="section-label">Step 3</div>
      <h2>What would their skin need most?</h2>
      <div id="needs-other" class="check-grid"></div>
      <div class="btn-row">
        <button class="action-btn secondary" onclick="backFromOther()">Back</button>
        <button class="action-btn" onclick="showResults()">See results</button>
      </div>
    </div>

    <div id="results" class="card hidden">
      <div class="section-label">Results</div>
      <h2>Your recommended routine</h2>
      <div id="results-content"></div>
      <div id="bundle-offer"></div>
      <div class="result">
        <a class="link-btn" href="./eloah-collective.vcf">Save Eloah for later</a>
      </div>
    </div>
  </div>

  <script>
    // ---------- season ----------
    function getSeasonMode() {
      const month = new Date().getMonth() + 1;
      return (month >= 4 && month <= 9) ? "spring_summer" : "fall_winter";
    }

    const SEASON_MODE = getSeasonMode();
    document.getElementById("season-note").textContent =
      SEASON_MODE === "spring_summer"
        ? "Showing spring/summer recommendations."
        : "Showing fall/winter recommendations.";

    // ---------- products ----------
    const ALL_PRODUCTS = {
      repair: {
        key: "repair",
        word: "Repair",
        blend: "Honey + Frankincense + Cinnamon Leaf + Nutmeg",
        shop: "https://www.eloahcollective.com/product/repair-honey-frankincense-cinnamon-leaf-nutmeg/QIT7JQRCOZTALEUHIY276GS4?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "repair_large", small: "repair_small" }
      },
      restore: {
        key: "restore",
        word: "Restore",
        blend: "Calendula + Jasmine + Lavender",
        shop: "https://www.eloahcollective.com/product/restore-calendula-jasmine-lavender/2K6LOVZZT4RT6HYMLARUSFFC?cs=true&cst=custom",
        sizes: { large: "restore_large", small: "restore_small" }
      },
      ground: {
        key: "ground",
        word: "Ground",
        blend: "Sweet Orange + Patchouli + Vanilla",
        shop: "https://www.eloahcollective.com/product/ground-sweet-orange-patchouli-vanilla/XAQAMETQRY2ATB3YB7BRKXHF?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "ground_large", small: "ground_small" }
      },
      tone: {
        key: "tone",
        word: "Tone",
        blend: "Jasmine + Lemongrass",
        shop: "https://www.eloahcollective.com/product/tone-jasmine-lemongrass/PFRUHPRHNYGV6CJYHR7ISXAL?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "tone_large", small: "tone_small" }
      },
      refine: {
        key: "refine",
        word: "Refine",
        blend: "Saffron + Vanilla + Rose",
        shop: "https://www.eloahcollective.com/product/refine-saffron-vanilla-rose/DFQ57IQ7TPKJMUFILMKCTVEB?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "refine_large", small: "refine_small" }
      },
      strengthen: {
        key: "strengthen",
        word: "Strengthen",
        blend: "Sweet Orange + Cedarwood",
        shop: "https://www.eloahcollective.com/product/strengthen-sweet-orange-cedarwood/DRR7YSABTQE2QU4B2LODJZHL?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "strengthen_large", small: "strengthen_small" }
      },
      fortify: {
        key: "fortify",
        word: "Fortify",
        blend: "Clove Bud + Sweet Orange + Vanilla Bean",
        shop: "https://www.eloahcollective.com/product/fortify-clove-bud-sweet-orange-vanilla-bean/BB7V3TX336OO4PHCAXWYPZFM?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "fortify_large", small: "fortify_small" }
      },
      energize: {
        key: "energize",
        word: "Energize",
        blend: "Peppermint + Vanilla Bean",
        shop: "https://www.eloahcollective.com/product/energize-peppermint-vanilla-bean/UCGLWFVFWUIJVPANOVYFSHPU?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "energize_large", small: "energize_small" }
      },
      thrive: {
        key: "thrive",
        word: "Thrive",
        blend: "Frankincense + Rose + Cedarwood",
        shop: "https://www.eloahcollective.com/product/thrive-frankincense-rose-cedarwood/YHSPFFHPS3TE4UFNFKWVKZNW?cp=true&sa=true&sbp=false&q=false",
        sizes: { large: "thrive_large", small: "thrive_small" }
      }
    };

    const ACTIVE_PRODUCT_KEYS =
      SEASON_MODE === "spring_summer"
        ? ["repair", "restore", "ground", "tone", "refine", "strengthen"]
        : ["repair", "restore", "ground", "fortify", "energize", "thrive"];

    const PRODUCTS = Object.fromEntries(
      ACTIVE_PRODUCT_KEYS.map(key => [key, ALL_PRODUCTS[key]])
    );

    // ---------- needs ----------
    const NEEDS_BY_SEASON = {
      spring_summer: [
        { key: "dry", label: "Dry / tight" },
        { key: "cracked", label: "Cracked / damaged" },
        { key: "sensitive", label: "Sensitive / reactive" },
        { key: "dull", label: "Dull / uneven" },
        { key: "firming", label: "Want firmer / brighter skin" },
        { key: "light", label: "Want something light / fresh" }
      ],
      fall_winter: [
        { key: "dry", label: "Dry / tight" },
        { key: "cracked", label: "Cracked / damaged" },
        { key: "sensitive", label: "Sensitive / reactive" },
        { key: "protect", label: "Want something warm / protective" },
        { key: "cooling", label: "Want something cooling / invigorating" },
        { key: "revive", label: "Want skin to feel refreshed / renewed" }
      ]
    };

    const NEEDS = NEEDS_BY_SEASON[SEASON_MODE];
    const NEED_LABELS = Object.fromEntries(NEEDS.map(n => [n.key, n.label]));

    const WEIGHTS_BY_SEASON = {
      spring_summer: {
        dry:       { repair: 2, ground: 1, restore: 1 },
        cracked:   { repair: 3 },
        sensitive: { restore: 3, repair: 1 },
        dull:      { refine: 2, strengthen: 1 },
        firming:   { strengthen: 3, refine: 1 },
        light:     { tone: 3, restore: 1 }
      },
      fall_winter: {
        dry:       { repair: 2, ground: 1, restore: 1, thrive: 1 },
        cracked:   { repair: 3, fortify: 1 },
        sensitive: { restore: 3, ground: 1 },
        protect:   { fortify: 3, repair: 1, ground: 1 },
        cooling:   { energize: 3 },
        revive:    { thrive: 3, energize: 1 }
      }
    };

    const WEIGHTS = WEIGHTS_BY_SEASON[SEASON_MODE];

    // ---------- fallback inventory ----------
    let inventory = {
      repair_large: 12, repair_small: 8,
      restore_large: 6, restore_small: 6,
      ground_large: 9, ground_small: 12,
      tone_large: 7, tone_small: 5,
      refine_large: 10, refine_small: 12,
      strengthen_large: 5, strengthen_small: 6,
      fortify_large: 8, fortify_small: 6,
      energize_large: 8, energize_small: 6,
      thrive_large: 8, thrive_small: 6
    };

    let shopFor = null;
    let needsMe = [];
    let needsOther = [];

    // ---------- UI helpers ----------
    function showStep(id) {
      ["step1", "step2a", "step2b", "results"].forEach(step => {
        document.getElementById(step).classList.add("hidden");
      });
      document.getElementById(id).classList.remove("hidden");
    }

    function selectShopFor(value, el) {
      shopFor = value;
      document.querySelectorAll("#step1 .choice-btn").forEach(btn => btn.classList.remove("selected"));
      el.classList.add("selected");
    }

    function toggleNeed(type, key, el) {
      let arr = type === "me" ? needsMe : needsOther;
      if (arr.includes(key)) {
        arr = arr.filter(x => x !== key);
        el.classList.remove("selected");
      } else {
        arr.push(key);
        el.classList.add("selected");
      }
      if (type === "me") needsMe = arr;
      else needsOther = arr;
    }

    function renderNeeds(containerId, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = NEEDS.map(n => `
        <button class="check-item" type="button" onclick="toggleNeed('${type}', '${n.key}', this)">
          ${n.label}
        </button>
      `).join("");
    }

    renderNeeds("needs-me", "me");
    renderNeeds("needs-other", "other");

    function goToNeeds() {
      if (!shopFor) {
        alert("Please choose who you're shopping for.");
        return;
      }
      showStep("step2a");
    }

    function goFromNeedsMe() {
      if (needsMe.length === 0) {
        alert("Please choose at least one need.");
        return;
      }
      if (shopFor === "both") {
        showStep("step2b");
      } else if (shopFor === "me") {
        showResults();
      } else {
        showStep("step2b");
      }
    }

    function backFromOther() {
      if (shopFor === "both") showStep("step2a");
      else showStep("step1");
    }

    async function fetchInventory() {
      return inventory;
    }

    function scoreNeeds(selectedNeeds) {
      const scores = {};
      for (const need of selectedNeeds) {
        const weightMap = WEIGHTS[need] || {};
        for (const [productKey, points] of Object.entries(weightMap)) {
          if (!PRODUCTS[productKey]) continue;
          scores[productKey] = (scores[productKey] || 0) + points;
        }
      }
      return scores;
    }

    function productHasStock(productKey) {
      const p = PRODUCTS[productKey];
      return (inventory[p.sizes.large] || 0) > 0 || (inventory[p.sizes.small] || 0) > 0;
    }

    function bestSize(productKey) {
      const p = PRODUCTS[productKey];
      const largeQty = inventory[p.sizes.large] || 0;
      const smallQty = inventory[p.sizes.small] || 0;
      if (largeQty > 0) return { label: "2 oz", qty: largeQty };
      if (smallQty > 0) return { label: "1 oz", qty: smallQty };
      return null;
    }

    function rankedInStockProducts(scores) {
      return Object.keys(PRODUCTS)
        .map(key => ({ key, score: scores[key] || 0 }))
        .filter(x => x.score > 0 && productHasStock(x.key))
        .sort((a, b) => b.score - a.score);
    }

    function formatNeedPhrase(needs) {
      const labels = needs.map(n => NEED_LABELS[n].toLowerCase());
      if (!labels.length) return "";
      if (labels.length === 1) return labels[0];
      if (labels.length === 2) return `${labels[0]} and ${labels[1]}`;
      return `${labels.slice(0, -1).join(", ")}, and ${labels[labels.length - 1]}`;
    }

    function getWhyLine(selectedNeeds) {
      const phrase = formatNeedPhrase(selectedNeeds);
      return phrase ? `Based on your ${phrase}` : "Based on what you selected";
    }

    function getPersonalizedReason(productKey, selectedNeeds) {
      const has = need => selectedNeeds.includes(need);

      switch (productKey) {
        case "repair":
          if (has("cracked") && has("dry")) return "Best for skin that feels very dry, rough, or overworked. This is my deepest moisture blend and the one I’d reach for when skin needs extra help.";
          if (has("cracked")) return "A great fit for skin that feels stressed, rough, or damaged. This one is all about deep nourishment and repair.";
          if (has("dry")) return "A strong match for dry, thirsty skin that needs deeper moisture. This is one of my richest, most supportive blends.";
          if (has("sensitive")) return "A good option if skin feels both sensitive and depleted. It gives more support when gentle alone doesn’t feel like enough.";
          return "This one is best when skin needs deeper moisture and extra support.";

        case "restore":
          if (has("sensitive") && has("dry")) return "A beautiful match for skin that is both sensitive and needing moisture. Gentle, calming, and easy to use every day.";
          if (has("sensitive")) return "Best for sensitive or reactive skin. This is my gentlest blend and a really easy starting point for most people.";
          return "A gentle, balanced choice for everyday moisture and calm support.";

        case "ground":
          if (has("dry")) return "A great everyday option for skin that needs moisture but not your heaviest blend. It helps keep skin soft, balanced, and comfortable.";
          return "A warm, balanced everyday moisture blend that works well when you want skin support without going too intense.";

        case "tone":
          return "A great fit if you want something lighter and fresher, especially in warmer weather. It still gives moisture without feeling too rich.";

        case "refine":
          if (has("dull") && has("firming")) return "A strong fit if you want skin to look brighter, smoother, and more refreshed. This one leans more glow-focused and luxurious.";
          if (has("dull")) return "Best if your skin feels dull or just needs a little glow. This one is all about a smoother, more radiant look.";
          return "A more glow-focused blend for skin that wants a polished, radiant feel.";

        case "strengthen":
          if (has("firming") && has("dull")) return "A really good match if you want both firming and brightening. This one helps skin look more awake, supported, and refreshed.";
          if (has("firming")) return "Best for skin that wants a little more firmness and support. Think refreshed, brighter, and more awake-looking.";
          return "A great option when your focus is brighter, firmer-looking skin.";

        case "fortify":
          return "A strong fit when you want something warm, supportive, and comforting. This one feels rich and protective, especially in colder months.";

        case "energize":
          return "A great fit if you want something cooling, fresh, and invigorating. This one feels especially good when you want that awake, refreshed feel.";

        case "thrive":
          return "A beautiful option when you want skin to feel renewed, refreshed, and a little more elevated. This one leans rich and restorative.";

        default:
          return "A strong match based on the needs you selected.";
      }
    }

    function renderRecommendationGroup(title, ranked, selectedNeeds) {
      if (!ranked.length) {
        return `
          <div class="result">
            <h3>${title}</h3>
            <p>I’m currently out of stock on the closest match for those needs, but you can still shop what’s available now.</p>
          </div>
        `;
      }

      const top3 = ranked.slice(0, 3);
      const whyLine = getWhyLine(selectedNeeds);

      return `
        <div class="result">
          <h3>${title}</h3>
          ${top3.map((item, index) => {
            const p = PRODUCTS[item.key];
            const size = bestSize(item.key);
            const reason = getPersonalizedReason(item.key, selectedNeeds);
            const badge =
              index === 0 ? "Best match" :
              index === 1 ? "Also a great fit" :
              "Good option";

            return `
              <div class="result">
                <h3>${p.word}</h3>
                <p class="small">${p.blend}</p>
                <p><strong>${whyLine}</strong>, this is a really good fit.</p>
                <p>${reason}</p>
                <div>
                  <span class="tag">${badge}</span>
                  ${size ? `<span class="tag">In stock: ${size.qty} (${size.label})</span>` : ``}
                </div>
                <a class="link-btn" href="${p.shop}" target="_blank" rel="noopener">View ${p.word}</a>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    async function showResults() {
      await fetchInventory();

      if ((shopFor === "me" || shopFor === "both") && needsMe.length === 0) {
        alert("Please choose at least one need for yourself.");
        return;
      }

      if ((shopFor === "other" || shopFor === "both") && needsOther.length === 0) {
        alert("Please choose at least one need for the other person.");
        return;
      }

      const scoresMe = scoreNeeds(needsMe);
      const scoresOther = scoreNeeds(needsOther);

      const rankedMe = rankedInStockProducts(scoresMe);
      const rankedOther = rankedInStockProducts(scoresOther);

      let html = "";
      let bundleCount = 0;

      if (shopFor === "me") {
        html += renderRecommendationGroup("Best matches for you", rankedMe, needsMe);
        bundleCount += Math.min(3, rankedMe.length);
      } else if (shopFor === "other") {
        html += renderRecommendationGroup("Best matches for them", rankedOther, needsOther);
        bundleCount += Math.min(3, rankedOther.length);
      } else {
        html += renderRecommendationGroup("For you", rankedMe, needsMe);
        html += renderRecommendationGroup("For them", rankedOther, needsOther);
        bundleCount += Math.min(3, rankedMe.length);
        bundleCount += Math.min(3, rankedOther.length);
      }

      document.getElementById("results-content").innerHTML = html;

      const bundle = document.getElementById("bundle-offer");
      if (bundleCount >= 3) {
        bundle.innerHTML = `
          <div class="bundle-box">
            <h3>Build your routine and save</h3>
            <p>If more than one of these sounds good, that’s normal. A lot of people like one for themselves and one or two more for gifting, seasonal changes, or different uses.</p>
            <p><strong>Buy 3 jars and save $10.</strong></p>
            <a class="link-btn" href="https://www.eloahcollective.com" target="_blank" rel="noopener">Open Eloah shop</a>
          </div>
        `;
      } else {
        bundle.innerHTML = `
          <div class="bundle-box">
            <h3>Shop what’s available now</h3>
            <p class="small">These recommendations are filtered to products that are currently in stock.</p>
            <a class="link-btn" href="https://www.eloahcollective.com" target="_blank" rel="noopener">Open Eloah shop</a>
          </div>
        `;
      }

      showStep("results");
    }
  </script>
</body>
</html>
